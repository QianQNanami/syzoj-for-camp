name: Deploy to szzx

on:
  push:
    branches:
      - master

concurrency:
  group: deploy-szzx
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Archive Build
        run: |
          tar \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='uploads' \
            --exclude='sessions' \
            --exclude='config.json' \
            -czf "$RUNNER_TEMP/syzoj-web.tar.gz" .

      - name: Configure SSH
        env:
          SZZX_SSH_KEY: ${{ secrets.SZZX_SSH_KEY }}
          SZZX_KNOWN_HOSTS: ${{ secrets.SZZX_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SZZX_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          printf '%s\n' "$SZZX_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Upload Release
        env:
          SZZX_HOST: ${{ secrets.SZZX_HOST }}
          SZZX_PORT: ${{ secrets.SZZX_PORT }}
          SZZX_USER: ${{ secrets.SZZX_USER }}
        run: |
          rsync -avz -e "ssh -p ${SZZX_PORT}" "$RUNNER_TEMP/syzoj-web.tar.gz" "${SZZX_USER}@${SZZX_HOST}:/home/deploy/syzoj-web.tar.gz"

      - name: Apply Release
        env:
          SZZX_HOST: ${{ secrets.SZZX_HOST }}
          SZZX_PORT: ${{ secrets.SZZX_PORT }}
          SZZX_USER: ${{ secrets.SZZX_USER }}
        run: |
          ssh -p "${SZZX_PORT}" "${SZZX_USER}@${SZZX_HOST}" "sudo /usr/local/bin/syzoj-deploy-web"
